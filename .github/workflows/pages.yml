name: Deploy Monitor To GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static monitor
        env:
          RQDATA_API_KEY: ${{ secrets.RQDATA_API_KEY }}
          RQDATA_USERNAME: ${{ secrets.RQDATA_USERNAME }}
          RQDATA_PASSWORD: ${{ secrets.RQDATA_PASSWORD }}
          RQDATA_URI: ${{ secrets.RQDATA_URI }}
          RQDATA_ADDR_HOST: rqdatad-pro.ricequant.com
          RQDATA_ADDR_PORT: "16011"
          RQDATA_MARKET: cn
        run: python monitor_server.py --export-static --source auto --funding-rate 0.03

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
