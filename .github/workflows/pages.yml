name: Refresh Monitor Data

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static monitor
        env:
          RQDATA_API_KEY: ${{ secrets.RQDATA_API_KEY }}
          RQDATA_USERNAME: ${{ secrets.RQDATA_USERNAME }}
          RQDATA_PASSWORD: ${{ secrets.RQDATA_PASSWORD }}
          RQDATA_URI: ${{ secrets.RQDATA_URI }}
          RQDATA_ADDR_HOST: rqdatad-pro.ricequant.com
          RQDATA_ADDR_PORT: "16011"
          RQDATA_MARKET: cn
        run: python monitor_server.py --export-static --source auto --funding-rate 0.03

      - name: Build option vertical spread monitor
        env:
          RQDATA_API_KEY: ${{ secrets.RQDATA_API_KEY }}
          RQDATA_USERNAME: ${{ secrets.RQDATA_USERNAME }}
          RQDATA_PASSWORD: ${{ secrets.RQDATA_PASSWORD }}
          RQDATA_URI: ${{ secrets.RQDATA_URI }}
          RQDATA_ADDR_HOST: rqdatad-pro.ricequant.com
          RQDATA_ADDR_PORT: "16011"
          RQDATA_MARKET: cn
        run: python option_vertical_app.py --export-static

      - name: Validate rqdata quotes
        run: python -c "import json; data=json.load(open('dist/data/latest_monitor.json', encoding='utf-8')); count=data.get('quote_status', {}).get('rqdata_prices', 0); print('rqdata_prices', count); raise SystemExit(0 if count > 0 else 1)"

      - name: Validate option quotes
        run: python -c "import json; data=json.load(open('dist/option-vertical-spread/opportunities.json', encoding='utf-8')); count=data.get('put_count', 0) + data.get('call_count', 0); print('option_quotes', count); raise SystemExit(0 if data.get('ok') and count > 0 else 1)"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
